<svg width="100%" viewBox="0 0 680 720" xmlns="http://www.w3.org/2000/svg">
<defs>
  <style>
    .bg { fill: #0a0f0a }
    .shield-outer { fill: #0d1f0d; stroke: #00ff41; stroke-width: 1.5 }
    .shield-inner { fill: #0a1a0a; stroke: #1a4a2a; stroke-width: 1 }
    .hex { fill: none; stroke: #003d1a; stroke-width: 0.8 }
    .hex-bright { fill: none; stroke: #00ff41; stroke-width: 0.6; opacity: 0.3 }
    .circuit { fill: none; stroke: #004d20; stroke-width: 1 }
    .circuit-bright { fill: none; stroke: #00cc33; stroke-width: 0.8 }
    .lock-body { fill: #0d1f0d; stroke: #00ff41; stroke-width: 1.5 }
    .lock-shackle { fill: none; stroke: #00ff41; stroke-width: 2 }
    .scan-line { fill: none; stroke: #00ff41; stroke-width: 0.5; opacity: 0.5 }
    .glow-line { fill: none; stroke: #00ff41; stroke-width: 1.5 }
    .accent-blue { fill: none; stroke: #0066ff; stroke-width: 1 }
    .accent-blue-fill { fill: #001133 }
    .dot-green { fill: #00ff41 }
    .dot-blue { fill: #0066ff }
    .text-main { font-family: 'Courier New', monospace; font-weight: 700; fill: #00ff41; letter-spacing: 3px }
    .text-sub { font-family: 'Courier New', monospace; font-weight: 400; fill: #004d20; letter-spacing: 6px }
    .text-tag { font-family: 'Courier New', monospace; font-weight: 400; fill: #0044cc; letter-spacing: 2px }
    .text-dim { font-family: 'Courier New', monospace; font-weight: 400; fill: #002a10; letter-spacing: 4px }
    .corner-mark { fill: none; stroke: #00ff41; stroke-width: 1 }
    .inner-glow { fill: #001a08; stroke: #00ff41; stroke-width: 0.5; opacity: 0.4 }
  </style>
</defs>

<!-- Background -->
<rect width="680" height="720" fill="#050a05"/>

<!-- Subtle grid background -->
<g class="hex">
  <line x1="0" y1="100" x2="680" y2="100"/>
  <line x1="0" y1="200" x2="680" y2="200"/>
  <line x1="0" y1="300" x2="680" y2="300"/>
  <line x1="0" y1="400" x2="680" y2="400"/>
  <line x1="0" y1="500" x2="680" y2="500"/>
  <line x1="0" y1="600" x2="680" y2="600"/>
  <line x1="100" y1="0" x2="100" y2="720"/>
  <line x1="200" y1="0" x2="200" y2="720"/>
  <line x1="300" y1="0" x2="300" y2="720"/>
  <line x1="380" y1="0" x2="380" y2="720"/>
  <line x1="480" y1="0" x2="480" y2="720"/>
  <line x1="580" y1="0" x2="580" y2="720"/>
</g>

<!-- Corner decorations -->
<g class="corner-mark">
  <polyline points="40,40 40,70 70,70"/>
  <polyline points="640,40 640,70 610,70"/>
  <polyline points="40,680 40,650 70,650"/>
  <polyline points="640,680 640,650 610,650"/>
</g>

<!-- Corner dots -->
<circle cx="40" cy="40" r="2" class="dot-green"/>
<circle cx="640" cy="40" r="2" class="dot-green"/>
<circle cx="40" cy="680" r="2" class="dot-green"/>
<circle cx="640" cy="680" r="2" class="dot-green"/>

<!-- Shield outer shape -->
<path d="M340,95 L520,145 L520,320 Q520,450 340,520 Q160,450 160,320 L160,145 Z"
      class="shield-outer"/>

<!-- Shield hex pattern inside -->
<path d="M340,105 L510,152 L510,318 Q510,440 340,508 Q170,440 170,318 L170,152 Z"
      fill="#080f08" stroke="#003d1a" stroke-width="0.8"/>

<!-- Circuit lines on shield -->
<g class="circuit">
  <line x1="220" y1="200" x2="260" y2="200"/>
  <line x1="260" y1="200" x2="260" y2="220"/>
  <line x1="260" y1="220" x2="290" y2="220"/>
  <line x1="420" y1="200" x2="460" y2="200"/>
  <line x1="420" y1="200" x2="420" y2="220"/>
  <line x1="390" y1="220" x2="420" y2="220"/>
  <line x1="220" y1="380" x2="255" y2="380"/>
  <line x1="255" y1="380" x2="255" y2="360"/>
  <line x1="255" y1="360" x2="285" y2="360"/>
  <line x1="460" y1="380" x2="425" y2="380"/>
  <line x1="425" y1="380" x2="425" y2="360"/>
  <line x1="395" y1="360" x2="425" y2="360"/>
</g>

<!-- Circuit dots -->
<circle cx="220" cy="200" r="2.5" class="dot-blue"/>
<circle cx="460" cy="200" r="2.5" class="dot-blue"/>
<circle cx="285" cy="360" r="2" class="dot-green"/>
<circle cx="395" cy="360" r="2" class="dot-green"/>

<!-- Bright circuit accent lines -->
<g class="circuit-bright">
  <line x1="310" y1="160" x2="370" y2="160"/>
  <line x1="340" y1="160" x2="340" y2="175"/>
</g>
<circle cx="310" cy="160" r="2" class="dot-green"/>
<circle cx="370" cy="160" r="2" class="dot-green"/>

<!-- Shield inner border -->
<path d="M340,120 L500,163 L500,318 Q500,432 340,495 Q180,432 180,318 L180,163 Z"
      fill="none" stroke="#00cc33" stroke-width="0.5" opacity="0.3"/>

<!-- Lock shackle -->
<path d="M310,270 Q310,240 340,240 Q370,240 370,270" class="lock-shackle"/>

<!-- Lock body -->
<rect x="295" y="268" width="90" height="72" rx="6" class="lock-body"/>

<!-- Lock keyhole -->
<circle cx="340" cy="296" r="10" fill="#050a05" stroke="#00ff41" stroke-width="1"/>
<rect x="336" y="296" width="8" height="18" rx="2" fill="#050a05" stroke="#00ff41" stroke-width="1"/>

<!-- Lock shackle posts -->
<line x1="310" y1="268" x2="310" y2="278" stroke="#00ff41" stroke-width="2"/>
<line x1="370" y1="268" x2="370" y2="278" stroke="#00ff41" stroke-width="2"/>

<!-- Lock bottom dots -->
<circle cx="314" cy="324" r="2" fill="#003d1a"/>
<circle cx="326" cy="324" r="2" fill="#003d1a"/>
<circle cx="338" cy="324" r="2" fill="#00ff41"/>
<circle cx="350" cy="324" r="2" fill="#003d1a"/>
<circle cx="362" cy="324" r="2" fill="#003d1a"/>

<!-- Binary strips -->
<text x="215" y="295" font-family="Courier New" font-size="8" fill="#002a10" letter-spacing="1">01101</text>
<text x="215" y="307" font-family="Courier New" font-size="8" fill="#003d1a" letter-spacing="1">10010</text>
<text x="215" y="319" font-family="Courier New" font-size="8" fill="#002a10" letter-spacing="1">11001</text>
<text x="215" y="331" font-family="Courier New" font-size="8" fill="#001a0a" letter-spacing="1">01110</text>
<text x="443" y="295" font-family="Courier New" font-size="8" fill="#001133" letter-spacing="1">10110</text>
<text x="443" y="307" font-family="Courier New" font-size="8" fill="#001a44" letter-spacing="1">01001</text>
<text x="443" y="319" font-family="Courier New" font-size="8" fill="#001133" letter-spacing="1">11010</text>
<text x="443" y="331" font-family="Courier New" font-size="8" fill="#000d22" letter-spacing="1">00111</text>

<!-- Scan lines -->
<line x1="175" y1="250" x2="505" y2="250" class="scan-line"/>
<line x1="175" y1="350" x2="505" y2="350" class="scan-line"/>
<line x1="185" y1="420" x2="495" y2="420" class="scan-line"/>

<!-- Shield bottom accent -->
<path d="M280,460 Q340,490 400,460" fill="none" stroke="#00cc33" stroke-width="1" opacity="0.6"/>
<circle cx="340" cy="488" r="3" class="dot-green"/>

<!-- Blue accent diamonds -->
<polygon points="160,310 150,320 160,330 170,320" fill="#0033aa" stroke="#0066ff" stroke-width="0.8"/>
<polygon points="520,310 510,320 520,330 530,320" fill="#0033aa" stroke="#0066ff" stroke-width="0.8"/>

<!-- Top shield accent -->
<line x1="290" y1="95" x2="340" y2="82" stroke="#00ff41" stroke-width="0.8" opacity="0.5"/>
<line x1="390" y1="95" x2="340" y2="82" stroke="#00ff41" stroke-width="0.8" opacity="0.5"/>
<circle cx="340" cy="82" r="3" class="dot-green"/>

<!-- Main title -->
<text x="340" y="572" text-anchor="middle" class="text-main" font-size="28">MikeUchiha122</text>

<!-- Decorative line under title -->
<line x1="160" y1="582" x2="280" y2="582" stroke="#003d1a" stroke-width="0.8"/>
<line x1="285" y1="582" x2="395" y2="582" stroke="#00ff41" stroke-width="1.5"/>
<line x1="400" y1="582" x2="520" y2="582" stroke="#003d1a" stroke-width="0.8"/>
<circle cx="280" cy="582" r="2" class="dot-blue"/>
<circle cx="400" cy="582" r="2" class="dot-blue"/>

<!-- Subtitle -->
<text x="340" y="608" text-anchor="middle" font-family="Courier New" font-size="11" fill="#004d20" letter-spacing="5">CYBERSECURITY · AI · DEV</text>

<!-- Bottom tag -->
<text x="340" y="638" text-anchor="middle" font-family="Courier New" font-size="9" fill="#002a10" letter-spacing="3">[ THREAT INTELLIGENCE AGENT ]</text>

<!-- Bottom scan line -->
<line x1="120" y1="655" x2="560" y2="655" stroke="#001a08" stroke-width="0.5"/>
<text x="340" y="668" text-anchor="middle" font-family="Courier New" font-size="8" fill="#001a08" letter-spacing="2">v2.0 // MIGUEL ÁNGEL RAMÍREZ GALICIA</text>

<!-- Status indicators -->
<circle cx="140" cy="664" r="3" fill="#00ff41" opacity="0.8"/>
<text x="150" y="668" font-family="Courier New" font-size="8" fill="#003d1a">ONLINE</text>
<circle cx="520" cy="664" r="3" fill="#0066ff" opacity="0.8"/>
<text x="530" y="668" font-family="Courier New" font-size="8" fill="#003d1a">SEC</text>

</svg>
